<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Signature Audit — Test</title>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #1a202c;
    }
    h1 { margin-top: 0; }
    p.intro { color: #4a5568; }
    form {
      background: #f7fafc;
      padding: 1.25rem;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
    }
    label {
      display: flex;
      align-items: center;
      margin: 0.6rem 0;
      gap: 0.75rem;
    }
    label > span {
      display: inline-block;
      width: 11rem;
      font-weight: 500;
    }
    input, select {
      padding: 0.45rem 0.6rem;
      font-size: 1rem;
      border: 1px solid #cbd5e0;
      border-radius: 4px;
      flex: 1;
      max-width: 24rem;
    }
    button {
      padding: 0.7rem 1.4rem;
      font-size: 1rem;
      cursor: pointer;
      background: #2c5282;
      color: white;
      border: 0;
      border-radius: 4px;
      margin-top: 0.6rem;
    }
    button:disabled { opacity: 0.55; cursor: wait; }
    #status, #results { margin-top: 1.5rem; }
    .progress {
      background: #ebf8ff;
      border-left: 4px solid #3182ce;
      padding: 0.8rem 1.1rem;
      border-radius: 0 4px 4px 0;
      line-height: 1.6;
    }
    .summary {
      background: #fff;
      padding: 1rem 1.25rem;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      margin-bottom: 1rem;
      line-height: 1.7;
    }
    .summary.clean {
      background: #f0fff4;
      border-left: 4px solid #38a169;
    }
    .missing-item {
      background: #fff5f5;
      padding: 0.6rem 1rem;
      border-left: 3px solid #c53030;
      margin: 0.4rem 0;
      border-radius: 0 4px 4px 0;
    }
    .unclear-item {
      background: #fffaf0;
      padding: 0.6rem 1rem;
      border-left: 3px solid #d69e2e;
      margin: 0.4rem 0;
      border-radius: 0 4px 4px 0;
    }
    .flagged-item {
      background: #fffaf0;
      padding: 0.6rem 1rem;
      border-left: 3px solid #dd6b20;
      margin: 0.4rem 0;
      border-radius: 0 4px 4px 0;
    }
    .missing-item small, .unclear-item small, .flagged-item small {
      color: #4a5568;
      font-style: italic;
    }
    pre {
      background: #1a202c;
      color: #cbd5e0;
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 0.82rem;
      line-height: 1.4;
    }
    details { margin-top: 1.5rem; }
    summary { cursor: pointer; font-weight: 500; padding: 0.4rem 0; }
  </style>
</head>
<body>
  <h1>Signature Audit — Test</h1>
  <p class="intro">
    Upload a contract PDF, pick the matching schema, and the audit runs in the background.
    Large packets are compressed client-side before upload (temporary — direct blob upload coming).
  </p>

  <form id="auditForm">
    <label>
      <span>Form schema</span>
      <select name="formId" required>
        <option value="CAR-RPA-1225">CAR-RPA-1225 (California RPA, 12/25 revision)</option>
        <option value="AD-BUYER-1224">AD-BUYER-1224 (Agency Disclosure, buyer side)</option>
      </select>
    </label>
    <label>
      <span>Buyer count</span>
      <input type="number" name="buyerCount" value="1" min="1" max="4" required />
    </label>
    <label>
      <span>Seller count</span>
      <input type="number" name="sellerCount" value="1" min="1" max="4" required />
    </label>
    <label>
      <span>PDF file</span>
      <input type="file" name="pdf" accept="application/pdf" required />
    </label>
    <button type="submit">Run audit</button>
  </form>

  <div id="status"></div>
  <div id="results"></div>

  <script>
    const POLL_INTERVAL_MS = 3000;
    const POLL_TIMEOUT_MS = 10 * 60 * 1000;

    // Netlify sync function body limit is 6 MB. Base64 encoding inflates ~33%.
    // So binary PDF must be under ~4.5 MB to fit after encoding.
    const FUNCTION_BODY_LIMIT = 6 * 1024 * 1024;
    const BASE64_INFLATION = 1.34;
    const MAX_BINARY_SIZE = Math.floor(FUNCTION_BODY_LIMIT / BASE64_INFLATION);

    document.getElementById('auditForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const statusEl = document.getElementById('status');
      const resultsEl = document.getElementById('results');

      btn.disabled = true;
      btn.textContent = 'Running…';
      statusEl.innerHTML = '';
      resultsEl.innerHTML = '';

      try {
        const fd = new FormData(e.target);
        const file = fd.get('pdf');
        const formId = fd.get('formId');
        const buyerCount = parseInt(fd.get('buyerCount'), 10);
        const sellerCount = parseInt(fd.get('sellerCount'), 10);

        // 1. Compress PDF client-side
        renderStatus(statusEl, `Compressing PDF (original: ${formatSize(file.size)})…`);
        const compressionResult = await safeCompress(file);
        const workingFile = compressionResult.file;
        const compressionMsg = compressionResult.message;
        renderStatus(statusEl, compressionMsg);

        // 2. Hard cap check
        if (workingFile.size > MAX_BINARY_SIZE) {
          throw new Error(
            `PDF is too large to upload: ${formatSize(workingFile.size)} after compression. ` +
            `Current test page supports up to ${formatSize(MAX_BINARY_SIZE)}. ` +
            `This limit will be removed when we move to direct blob upload.`
          );
        }

        // 3. Encode and submit
        renderStatus(statusEl, `${compressionMsg} · Uploading…`);
        const pdfBase64 = await fileToBase64(workingFile);

        const submitResp = await fetch('/.netlify/functions/audit-submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pdfBase64, formId, buyerCount, sellerCount }),
        });

        if (!submitResp.ok) {
          const errText = await submitResp.text();
          throw new Error(`Submit failed (${submitResp.status}): ${errText}`);
        }

        const { jobId } = await submitResp.json();
        if (!jobId) throw new Error('Submit response did not include jobId');

        renderProgress(statusEl, jobId, 0);

        // 4. Poll for results
        const final = await pollUntilDone(jobId, statusEl);
        statusEl.innerHTML = '';

        if (final.status === 'error') {
          resultsEl.innerHTML = `<div class="missing-item"><strong>Audit failed:</strong> ${escapeHtml(final.error || 'unknown error')}</div>`;
          return;
        }

        renderResults(final.result);
      } catch (err) {
        statusEl.innerHTML = '';
        resultsEl.innerHTML = `<div class="missing-item">Error: ${escapeHtml(err.message)}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Run audit';
      }
    });

    // ===== PDF compression =====

    async function safeCompress(file) {
      try {
        const compressed = await compressPdf(file);
        const ratio = ((1 - compressed.size / file.size) * 100).toFixed(0);
        const message = compressed.size < file.size
          ? `Compressed: ${formatSize(file.size)} → ${formatSize(compressed.size)} (${ratio}% reduction)`
          : `Compression complete (no size reduction). Using ${formatSize(compressed.size)}.`;
        return { file: compressed, message };
      } catch (err) {
        console.warn('Compression failed, falling back to original:', err);
        return {
          file,
          message: `Compression unavailable (${err.message}). Using original: ${formatSize(file.size)}.`,
        };
      }
    }

    async function compressPdf(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
      const compressedBytes = await pdfDoc.save({
        useObjectStreams: true,
        addDefaultPage: false,
        objectsPerTick: 50,
      });
      return new Blob([compressedBytes], { type: 'application/pdf' });
    }

    // ===== Utilities =====

    function formatSize(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
    }

    function fileToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = () => reject(new Error('Failed to read file'));
        reader.readAsDataURL(blob);
      });
    }

    async function pollUntilDone(jobId, statusEl) {
      const startTime = Date.now();
      while (true) {
        if (Date.now() - startTime > POLL_TIMEOUT_MS) {
          throw new Error('Audit timed out after 10 minutes');
        }

        await sleep(POLL_INTERVAL_MS);

        const resp = await fetch(`/.netlify/functions/audit-status?jobId=${encodeURIComponent(jobId)}`);
        const data = await resp.json();

        const elapsedSec = Math.floor((Date.now() - startTime) / 1000);
        renderProgress(statusEl, jobId, elapsedSec);

        if (data.status === 'complete' || data.status === 'error') {
          return data;
        }
      }
    }

    function sleep(ms) {
      return new Promise((r) => setTimeout(r, ms));
    }

    function renderStatus(el, message) {
      el.innerHTML = `<div class="progress">${escapeHtml(message)}</div>`;
    }

    function renderProgress(el, jobId, elapsedSec) {
      el.innerHTML = `<div class="progress">
        <strong>Audit running…</strong> Elapsed: ${elapsedSec}s. Polling every ${POLL_INTERVAL_MS / 1000}s.<br>
        <small>Job ID: ${escapeHtml(jobId)}</small>
      </div>`;
    }

    function renderResults(data) {
      const resultsEl = document.getElementById('results');

      if (!data) {
        resultsEl.innerHTML = `<div class="missing-item">No result data returned.</div>`;
        return;
      }

      const s = data.summary || {};
      const missing = (s.missingItems || []).filter((i) => i.status === 'absent');
      const unclear = (s.missingItems || []).filter((i) => i.status === 'unclear');
      const flagged = s.flaggedItems || [];

      const isClean = missing.length === 0 && unclear.length === 0 && flagged.length === 0;

      let html = `<div class="summary${isClean ? ' clean' : ''}">
        <strong>Form:</strong> ${escapeHtml(data.formName)} (${escapeHtml(data.formId)})<br>
        <strong>Contract state:</strong> ${escapeHtml(data.detection ? data.detection.state : 'n/a')}<br>
        <strong>Parties:</strong> ${data.partyCount.buyers} buyer(s), ${data.partyCount.sellers} seller(s)<br>
        <strong>Entity scenarios:</strong> buyer=${data.detection && data.detection.buyer_is_entity}, seller=${data.detection && data.detection.seller_is_entity}<br>
        <strong>Form pages:</strong> ${JSON.stringify(data.formPages)} of ${data.totalPages}<br>
        <strong>Checks run:</strong> ${data.checksRun}<br>
        <strong>Present:</strong> ${s.present || 0} &nbsp;|&nbsp;
        <strong>Absent:</strong> ${s.absent || 0} &nbsp;|&nbsp;
        <strong>Unclear:</strong> ${s.unclear || 0} &nbsp;|&nbsp;
        <strong>N/A:</strong> ${s.not_applicable || 0} &nbsp;|&nbsp;
        <strong>Errors:</strong> ${s.error || 0}<br>
        <strong>Identity matches:</strong> signer=${s.matches_signer || 0}, entity=${s.matches_entity || 0}, other=${s.matches_other || 0}
      </div>`;

      if (isClean) {
        html += `<div class="summary clean"><strong>No missing signatures, initials, or entity mismatches detected.</strong></div>`;
      } else {
        if (missing.length > 0) {
          html += `<h2>Missing (${missing.length})</h2>`;
          for (const item of missing) {
            html += `<div class="missing-item">
              <strong>${escapeHtml(item.party)} — ${escapeHtml(item.markType)}</strong>
              on page ${item.page} &nbsp;·&nbsp; <code>${escapeHtml(item.locationId)}</code><br>
              <small>${escapeHtml(item.reasoning || '')}</small>
            </div>`;
          }
        }
        if (unclear.length > 0) {
          html += `<h2>Needs human review — unclear (${unclear.length})</h2>`;
          for (const item of unclear) {
            html += `<div class="unclear-item">
              <strong>${escapeHtml(item.party)} — ${escapeHtml(item.markType)}</strong>
              on page ${item.page} &nbsp;·&nbsp; <code>${escapeHtml(item.locationId)}</code><br>
              <small>${escapeHtml(item.reasoning || '')}</small>
            </div>`;
          }
        }
        if (flagged.length > 0) {
          html += `<h2>Entity signature issues (${flagged.length})</h2>`;
          for (const item of flagged) {
            html += `<div class="flagged-item">
              <strong>${escapeHtml(item.party)} — ${escapeHtml(item.status)}</strong>
              on page ${item.page} &nbsp;·&nbsp; <code>${escapeHtml(item.locationId)}</code><br>
              <small>${escapeHtml(item.reasoning || '')}</small>
            </div>`;
          }
        }
      }

      html += `<details><summary>Raw JSON output</summary><pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre></details>`;
      resultsEl.innerHTML = html;
    }

    function escapeHtml(str) {
      return String(str == null ? '' : str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
