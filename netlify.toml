[functions]
  node_bundler = "esbuild"
  # DO NOT externalise pdf-parse or @napi-rs/canvas here. Both were tried 2026-07-13 and
  # both killed the function: it loaded, identify succeeded, then the process died ~52s in
  # with NO error logged (a native crash below the JS layer — externalising stops Netlify
  # bundling the canvas .node binding). Keep this list as-is.
  #
  # The standard-font problem it was trying to solve is real, but it is fixed IN CODE by
  # passing standardFontDataUrl explicitly (see renderAllPagesAsImages), resolved through
  # pdfjs-dist — which IS external, so its standard_fonts/ directory exists on disk.
  external_node_modules = ["pdfjs-dist"]

# Disclosure Intake Pipeline — the watcher runs every 2 minutes, scans each
# "Incoming" folder, and emits a disclosure.uploaded event per new PDF. (The
# poller has no AI cost — just a Drive listing — so a tight interval is cheap.)
[functions."disclosure-watch-poller"]
  schedule = "*/2 * * * *"

# Email Router — the poller scans the intake label and fans new messages out to
# email-route-background. It only LISTS message ids (no body fetch, no AI) so a
# tight interval is cheap; the per-message AI cost lives in the consumer and is
# deduped by the seen store. Inert until EMAIL_ROUTER_ENABLED=true (see the
# function header), so this schedule is safe to deploy before go-live.
[functions."email-route-poller"]
  schedule = "*/5 * * * *"
